name: Captura CLV (linha de fechamento Pinnacle)

on:
  schedule:
    - cron: "*/15 * * * *"     # a cada 15 min (UTC). Melhor esforço — pode atrasar alguns min.
  workflow_dispatch: {}         # permite rodar na mão pelo botão "Run workflow"

permissions:
  contents: write

concurrency:
  group: clv-capture
  cancel-in-progress: false

jobs:
  capturar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6        # era @v4
      - uses: actions/setup-python@v6    # era @v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Capturar linha de fechamento
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python capturar_fechamento.py
      - name: Commit do fechamentos.csv (se mudou)
        run: |
          git config user.name  "clv-bot"
          git config user.email "clv-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain fechamentos.csv)" ]; then
            git add fechamentos.csv
            git commit -m "captura CLV $(date -u +%FT%TZ)"
            git push
          else
            echo "Nada novo p/ commitar."
          fi
